<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="60" y1="60" x2="1140" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10141B"/>
      <stop offset="1" stop-color="#06080B"/>
    </linearGradient>
    <linearGradient id="accent3" x1="40" y1="80" x2="1160" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#59D7FF"/>
      <stop offset="1" stop-color="#FF8B4D"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="760" rx="28" fill="url(#bg3)"/>
  <rect x="24" y="24" width="1152" height="712" rx="22" stroke="#FFB85C" stroke-opacity="0.38" stroke-width="2"/>
  <text x="58" y="92" fill="#F1E7D8" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="0.14em">WHAT ACTUALLY HELPS / DEFENSE MATRIX</text>
  <path d="M58 128 H1142" stroke="url(#accent3)" stroke-opacity="0.45" stroke-width="2"/>

  <g transform="translate(58 168)">
    <rect width="332" height="510" rx="28" fill="#11161E" stroke="#59D7FF" stroke-opacity="0.24"/>
    <text x="28" y="40" fill="#B8C1CC" font-family="IBM Plex Mono, monospace" font-size="12" letter-spacing="0.18em">FOR INSTITUTIONS</text>
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M58 108 h36" stroke="#59D7FF" stroke-width="4"/>
      <path d="M76 90 v36" stroke="#59D7FF" stroke-width="4"/>
    </g>
    <text x="108" y="114" fill="#F1E7D8" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Cross-institution signals</text>
    <text x="108" y="152" fill="#AAB3BF" font-family="Inter, Arial, sans-serif" font-size="16">Detect the same device, IP, or application fingerprint across multiple banks.</text>
    <path d="M58 208 h36" stroke="#FF8B4D" stroke-width="4" stroke-linecap="round"/>
    <path d="M76 190 v36" stroke="#FF8B4D" stroke-width="4" stroke-linecap="round"/>
    <text x="108" y="214" fill="#F1E7D8" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Velocity checks</text>
    <text x="108" y="252" fill="#AAB3BF" font-family="Inter, Arial, sans-serif" font-size="16">Look for new accounts that scale too fast: limit growth, tradeline seasoning, or unusual draw patterns.</text>
    <path d="M58 308 h36" stroke="#F1E7D8" stroke-width="4" stroke-linecap="round"/>
    <path d="M76 290 v36" stroke="#F1E7D8" stroke-width="4" stroke-linecap="round"/>
    <text x="108" y="314" fill="#F1E7D8" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">SSN-age match</text>
    <text x="108" y="352" fill="#AAB3BF" font-family="Inter, Arial, sans-serif" font-size="16">Cross-check claimed age against the SSN issue date and the expected credit-file age.</text>
  </g>

  <g transform="translate(434 168)">
    <rect width="708" height="510" rx="28" fill="#0D1218" stroke="#59D7FF" stroke-opacity="0.22"/>
    <text x="28" y="40" fill="#B8C1CC" font-family="IBM Plex Mono, monospace" font-size="12" letter-spacing="0.18em">FOR INDIVIDUALS</text>
    <g transform="translate(28 78)">
      <rect x="0" y="0" width="652" height="362" rx="22" fill="#11161E" stroke="#2B3340"/>
      <rect x="36" y="42" width="272" height="110" rx="18" fill="#0C1016" stroke="#59D7FF" stroke-opacity="0.24"/>
      <text x="58" y="78" fill="#59D7FF" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Freeze a child's credit early</text>
      <text x="58" y="108" fill="#AAB3BF" font-family="Inter, Arial, sans-serif" font-size="15">All three bureaus allow it. That makes the file harder to hijack before a teenager ever needs credit.</text>
      <rect x="344" y="42" width="272" height="110" rx="18" fill="#0C1016" stroke="#FF8B4D" stroke-opacity="0.24"/>
      <text x="366" y="78" fill="#FF8B4D" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Review your own file</text>
      <text x="366" y="108" fill="#AAB3BF" font-family="Inter, Arial, sans-serif" font-size="15">Check reports periodically so synthetic activity shows up as a stranger's account, not a hidden fragment.</text>
      <rect x="36" y="180" width="580" height="140" rx="18" fill="#0C1016" stroke="#F1E7D8" stroke-opacity="0.2"/>
      <text x="58" y="216" fill="#F1E7D8" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">The practical pattern</text>
      <text x="58" y="248" fill="#AAB3BF" font-family="Inter, Arial, sans-serif" font-size="15">Use layered defenses: freezes, alerts, periodic review, and alertness to applications you never opened.</text>
      <text x="58" y="278" fill="#AAB3BF" font-family="Inter, Arial, sans-serif" font-size="15">Synthetic identity fraud is durable because it hides in plain sight. The right check breaks the delay.</text>
    </g>
    <text x="28" y="468" fill="#9EA8B7" font-family="IBM Plex Mono, monospace" font-size="12" letter-spacing="0.16em">DEFENSES WORK BEST WHEN THE FILE IS FLAGGED BEFORE IT SEASONs</text>
  </g>
</svg>
