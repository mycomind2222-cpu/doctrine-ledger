<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#04060b"/>
      <stop offset="1" stop-color="#0a1521"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="42" y="42" width="1516" height="816" rx="28" stroke="rgba(255,139,77,0.35)" stroke-width="2"/>
  <rect x="92" y="112" width="1416" height="90" rx="24" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>
  <text x="800" y="171" fill="#f4eadc" font-family="Arial, Helvetica, sans-serif" font-size="30" text-anchor="middle" letter-spacing="4">WHAT GENERALLY HELPS</text>

  <g font-family="Arial, Helvetica, sans-serif" fill="#f4eadc">
    <g transform="translate(136 272)">
      <rect width="290" height="450" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(138,208,255,0.22)" stroke-width="2"/>
      <circle cx="72" cy="76" r="42" fill="rgba(138,208,255,0.12)" stroke="#8ad0ff" stroke-width="3" filter="url(#glow)"/>
      <path d="M 58 76 H 86" stroke="#8ad0ff" stroke-width="4" stroke-linecap="round"/>
      <path d="M 72 62 V 90" stroke="#8ad0ff" stroke-width="4" stroke-linecap="round"/>
      <text x="132" y="62" font-size="18" fill="#8ad0ff" letter-spacing="4">LAYER 1</text>
      <text x="132" y="98" font-size="30" font-weight="700">Application gate</text>
      <text x="34" y="182" font-size="18" fill="#d7c5b0">Validate what a model is allowed to do with retrieved content before it reaches any tool.</text>
    </g>
    <g transform="translate(458 272)">
      <rect width="290" height="450" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,139,77,0.22)" stroke-width="2"/>
      <circle cx="72" cy="76" r="42" fill="rgba(255,139,77,0.12)" stroke="#ff8b4d" stroke-width="3" filter="url(#glow)"/>
      <path d="M 60 86 L 72 58 L 84 86" stroke="#ff8b4d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="132" y="62" font-size="18" fill="#ff8b4d" letter-spacing="4">LAYER 2</text>
      <text x="132" y="98" font-size="30" font-weight="700">Least privilege</text>
      <text x="34" y="182" font-size="18" fill="#d7c5b0">Treat agent actions like privileged accounts, with review, rotation, and explicit limits.</text>
    </g>
    <g transform="translate(780 272)">
      <rect width="290" height="450" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(138,208,255,0.22)" stroke-width="2"/>
      <circle cx="72" cy="76" r="42" fill="rgba(138,208,255,0.12)" stroke="#8ad0ff" stroke-width="3" filter="url(#glow)"/>
      <path d="M 50 78 C 62 56, 82 56, 94 78" stroke="#8ad0ff" stroke-width="4" stroke-linecap="round"/>
      <path d="M 50 78 C 62 100, 82 100, 94 78" stroke="#8ad0ff" stroke-width="4" stroke-linecap="round"/>
      <text x="132" y="62" font-size="18" fill="#8ad0ff" letter-spacing="4">LAYER 3</text>
      <text x="132" y="98" font-size="30" font-weight="700">Adversarial tests</text>
      <text x="34" y="182" font-size="18" fill="#d7c5b0">Probe with real jailbreaks, poisoned documents, and tool-abuse chains before launch.</text>
    </g>
    <g transform="translate(1102 272)">
      <rect width="290" height="450" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,139,77,0.22)" stroke-width="2"/>
      <circle cx="72" cy="76" r="42" fill="rgba(255,139,77,0.12)" stroke="#ff8b4d" stroke-width="3" filter="url(#glow)"/>
      <path d="M 52 76 H 92" stroke="#ff8b4d" stroke-width="4" stroke-linecap="round"/>
      <path d="M 72 56 V 96" stroke="#ff8b4d" stroke-width="4" stroke-linecap="round"/>
      <text x="132" y="62" font-size="18" fill="#ff8b4d" letter-spacing="4">LAYER 4</text>
      <text x="132" y="98" font-size="30" font-weight="700">Human checkpoint</text>
      <text x="34" y="182" font-size="18" fill="#d7c5b0">Add review before sending, deleting, purchasing, or publishing anything on a user's behalf.</text>
    </g>
  </g>

  <circle cx="800" cy="584" r="152" fill="rgba(255,139,77,0.08)" stroke="rgba(255,139,77,0.35)" stroke-width="2"/>
  <circle cx="800" cy="584" r="92" fill="rgba(138,208,255,0.06)" stroke="#8ad0ff" stroke-width="3" filter="url(#glow)"/>
  <path d="M 762 584 H 838" stroke="#8ad0ff" stroke-width="5" stroke-linecap="round"/>
  <path d="M 800 546 V 622" stroke="#ff8b4d" stroke-width="5" stroke-linecap="round"/>
  <text x="800" y="746" fill="#f4eadc" font-family="Arial, Helvetica, sans-serif" font-size="24" text-anchor="middle" letter-spacing="3">
    Reduce privilege before the model sees the prompt
  </text>
</svg>
